<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontier Community — Thread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080a0f; --bg2:#0d1018; --surface:#111520; --surface2:#161c2a;
      --border:rgba(74,144,226,0.10); --border2:rgba(74,144,226,0.22);
      --blue:#1a6fd4; --blue-light:#4db8ff; --blue-glow:rgba(26,111,212,0.35);
      --gold:#f5c518; --text:#dce8f5; --text-muted:#6a7f99; --text-dim:#2e3c50;
      --red:#ff4060; --green:#22d47a;
      --r-sm:8px; --r:12px; --r-lg:18px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;display:flex;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.35;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--blue);}

    /* TOAST */
    #toast{position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast-msg{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 18px;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;animation:toastIn 0.28s cubic-bezier(.22,1,.36,1) both;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
    .toast-msg.success{border-color:rgba(34,212,122,0.3);color:var(--green);}
    .toast-msg.error{border-color:rgba(255,64,96,0.3);color:var(--red);}
    .toast-msg.info{border-color:rgba(77,184,255,0.25);color:var(--blue-light);}
    .toast-msg.out{animation:toastOut 0.22s ease both;}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(6px)}}

    /* CONFIRM MODAL */
    #confirm-modal{position:fixed;inset:0;background:rgba(8,10,15,0.82);backdrop-filter:blur(6px);z-index:9998;display:none;align-items:center;justify-content:center;}
    #confirm-modal.open{display:flex;}
    .confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:32px 28px 24px;width:360px;max-width:90vw;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:confirmIn 0.22s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden;}
    .confirm-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),rgba(255,64,96,0.3));}
    @keyframes confirmIn{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .confirm-icon{font-size:36px;margin-bottom:12px;}
    .confirm-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .confirm-msg{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.5;}
    .confirm-btns{display:flex;gap:10px;justify-content:center;}
    .confirm-cancel{padding:9px 22px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;}
    .confirm-cancel:hover{border-color:var(--blue);color:var(--text);}
    .confirm-ok{padding:9px 22px;border-radius:var(--r);border:none;background:var(--red);color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.18s;}
    .confirm-ok:hover{opacity:0.82;}

    /* LEFT SIDEBAR */
    .sidebar-left{position:fixed;top:0;left:0;width:228px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow-y:auto;}
    .logo-area{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
    .logo-area img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(77,184,255,0.45));}
    .logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,var(--blue-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sidebar-profile{margin:16px 13px 6px;padding:12px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color 0.2s;text-decoration:none;}
    .sidebar-profile:hover{border-color:var(--blue);}
    .sidebar-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--blue);flex-shrink:0;}
    .sidebar-uname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
    .sidebar-handle{font-size:11px;color:var(--text-muted);}
    .nav-section{padding:14px 10px 8px;flex:1;}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 12px;margin-bottom:5px;display:block;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:var(--r-sm);color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;transition:all 0.2s;margin-bottom:2px;}
    .nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
    .nav-item.active{background:rgba(26,111,212,0.12);color:var(--blue-light);}
    .nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
    .sidebar-bottom{padding:14px;border-top:1px solid var(--border);}
    .btn-logout{width:100%;padding:9px;background:rgba(255,64,96,0.07);border:1px solid rgba(255,64,96,0.18);border-radius:var(--r-sm);color:var(--red);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
    .btn-logout:hover{background:rgba(255,64,96,0.16);border-color:rgba(255,64,96,0.4);}

    /* MAIN */
    .main{margin-left:228px;flex:1;display:flex;min-height:100vh;justify-content:center;}

    /* THREAD DETAIL */
    .thread-detail{width:100%;max-width:740px;padding:28px 24px 80px;}

    /* BACK BAR */
    .back-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
    .btn-back{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;text-decoration:none;}
    .btn-back:hover{border-color:var(--blue);color:var(--text);}
    .breadcrumb{font-size:12px;color:var(--text-dim);}
    .breadcrumb a{color:var(--text-muted);text-decoration:none;}
    .breadcrumb a:hover{color:var(--blue-light);}

    /* THREAD BODY */
    .thread-body{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:24px;animation:fadeUp 0.3s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .thread-stripe{height:3px;background:linear-gradient(90deg,var(--blue),transparent);}
    .thread-inner{padding:24px 28px;}
    .thread-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
    .thread-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0;}
    .thread-meta{flex:1;}
    .thread-author{font-size:14px;font-weight:700;color:var(--text);}
    .thread-author a{color:inherit;text-decoration:none;}
    .thread-author a:hover{color:var(--blue-light);}
    .thread-time-full{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .thread-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.18);}
    .thread-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:12px;}
    .thread-content{font-size:14px;color:var(--text-muted);line-height:1.8;margin-bottom:20px;white-space:pre-wrap;word-break:break-word;}
    .thread-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .action-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.18s;}
    .action-btn:hover{border-color:var(--border2);color:var(--text);}
    .action-btn.liked{border-color:rgba(26,111,212,0.5);color:var(--blue-light);background:rgba(26,111,212,0.1);}
    .action-btn.disliked{border-color:rgba(255,64,96,0.4);color:var(--red);background:rgba(255,64,96,0.08);}
    .action-btn.bookmarked{border-color:rgba(245,197,24,0.4);color:var(--gold);background:rgba(245,197,24,0.08);}
    .action-btn.delete-btn{margin-left:auto;border-color:rgba(255,64,96,0.2);color:rgba(255,64,96,0.5);}
    .action-btn.delete-btn:hover{border-color:rgba(255,64,96,0.5);color:var(--red);background:rgba(255,64,96,0.08);}

    /* COMMENTS SECTION */
    .comments-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .comments-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;color:var(--text);}
    .reply-count-badge{font-size:12px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}

    /* TOP REPLY BOX */
    .top-reply-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;}
    .top-reply-row{display:flex;gap:8px;align-items:center;}
    .reply-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:9px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
    .reply-input::placeholder{color:var(--text-dim);}
    .reply-input:focus{border-color:var(--blue);}
    .btn-reply{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.22);padding:8px 18px;border-radius:30px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
    .btn-reply:hover:not(:disabled){background:rgba(26,111,212,0.22);border-color:var(--blue);}
    .btn-reply:disabled{opacity:0.5;cursor:not-allowed;}

    /* COMMENT ITEMS */
    .comment-tree{display:flex;flex-direction:column;gap:8px;}
    .comment-item{display:flex;gap:9px;}
    .comment-right{flex:1;min-width:0;}
    .comment-bubble{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;}
    .comment-bubble.deleted{opacity:0.45;font-style:italic;}
    .comment-author{font-size:11px;font-weight:700;color:var(--blue-light);margin-bottom:3px;}
    .comment-text{font-size:13px;color:var(--text-muted);line-height:1.6;word-break:break-word;}
    .comment-footer{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
    .comment-time{font-size:10px;color:var(--text-dim);}
    .comment-action{font-size:10px;font-weight:700;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s;font-family:'Nunito',sans-serif;}
    .comment-action:hover{color:var(--text-muted);}
    .comment-action.c-like.active{color:var(--blue-light);}
    .comment-action.c-dislike.active{color:var(--red);}
    .comment-action.c-delete:hover{color:var(--red);}
    .reply-form{display:flex;gap:6px;margin-top:8px;align-items:center;}
    .reply-form input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;outline:none;transition:border-color 0.2s;}
    .reply-form input::placeholder{color:var(--text-dim);}
    .reply-form input:focus{border-color:var(--blue);}
    .reply-form button{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.22);padding:5px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
    .reply-form button:hover{background:rgba(26,111,212,0.2);}

    /* MISC */
    .spinner{width:20px;height:20px;border:2px solid rgba(26,111,212,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin 0.75s linear infinite;margin:14px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state{padding:44px 20px;text-align:center;color:var(--text-muted);font-size:13px;}
    .loading-state .spinner{margin:0 auto 12px;}
    .empty-state{padding:32px 20px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);}
    .empty-state p{font-size:13px;color:var(--text-muted);}

    /* ── SEARCH ── */
    .search-wrapper{position:relative;padding:10px 13px 6px;}
    .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px 8px 32px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;outline:none;transition:border-color 0.2s;}
    .search-input::placeholder{color:var(--text-dim);}
    .search-input:focus{border-color:var(--blue);}
    .search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;color:var(--text-dim);}
    .search-dropdown{position:absolute;top:100%;left:13px;right:13px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);z-index:999;max-height:340px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.5);display:none;}
    .search-dropdown.open{display:block;}
    .search-result-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;gap:9px;align-items:center;transition:background 0.15s;}
    .search-result-item:last-child{border-bottom:none;}
    .search-result-item:hover{background:var(--surface2);}
    .search-result-item.section-header{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:default;padding:8px 13px 4px;}
    .search-result-item.section-header:hover{background:transparent;}
    .search-result-title{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .search-result-meta{font-size:10px;color:var(--text-muted);margin-top:1px;}
    .search-mini-av{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;}

    @media(max-width:700px){
      .sidebar-left{width:56px;}
      .logo-text,.sidebar-uname,.sidebar-handle,.nav-item span,.nav-label{display:none;}
      .main{margin-left:56px;}
      .thread-detail{padding:16px 12px 60px;}
      .thread-inner{padding:16px;}
    }

    /* ── NOTIFICATION BELL ── */
    #notif-bell {
      position: fixed;
      top: 18px;
      right: 24px;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 50%;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 18px;
      flex-shrink: 0;
    }
    #notif-bell:hover { border-color: var(--blue); background: var(--surface2); }

    #notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--red);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg);
      line-height: 1;
    }
    #notif-badge.visible { display: flex; }

    #notif-dropdown {
      position: fixed;
      top: 66px;
      right: 24px;
      width: 340px;
      max-height: 480px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-lg);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      z-index: 4999;
      display: none;
      flex-direction: column;
      overflow: hidden;
      animation: notifIn 0.2s cubic-bezier(.22,1,.36,1) both;
    }
    #notif-dropdown.open { display: flex; }
    @keyframes notifIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .notif-header-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .notif-read-all {
      font-size: 11px;
      font-weight: 700;
      color: var(--blue-light);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: 'Nunito', sans-serif;
      transition: opacity 0.15s;
    }
    .notif-read-all:hover { opacity: 0.7; }

    .notif-list {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .notif-list::-webkit-scrollbar { width: 4px; }
    .notif-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--surface2); }
    .notif-item.unread { background: rgba(26,111,212,0.05); }
    .notif-item.unread::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--blue);
      border-radius: 0 2px 2px 0;
    }

    .notif-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
    }
    .notif-avatar-placeholder {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .notif-body { flex: 1; min-width: 0; }
    .notif-text { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 3px; }
    .notif-text strong { color: var(--blue-light); font-weight: 700; }
    .notif-ref { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-time { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    .notif-empty { padding: 36px 20px; text-align: center; color: var(--text-dim); font-size: 13px; }
    .notif-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.35; }
  </style>
</head>
<body onload="initThread()">

<div id="toast"></div>

<div id="confirm-modal" onclick="if(event.target===this)closeConfirm(false)">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon">🗑</div>
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg">This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="confirm-ok" id="confirm-ok" onclick="closeConfirm(true)">Delete</button>
    </div>
  </div>
</div>

<!-- Notification Bell -->
<div id="notif-bell" onclick="toggleNotifDropdown()" title="Notifications">
  🔔
  <span id="notif-badge"></span>
</div>

<div id="notif-dropdown">
  <div class="notif-header">
    <span class="notif-header-title">Notifications</span>
    <div class="notif-header-actions">
      <button class="notif-read-all" onclick="markAllNotifRead()">Mark all read</button>
      <button class="notif-read-all notif-clear-all" onclick="clearAllNotifs()">Clear all</button>
    </div>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="notif-empty"><div class="notif-empty-icon">🔔</div>No notifications yet</div>
  </div>
</div>

<div id="toast"></div>

<div id="confirm-modal" onclick="if(event.target===this)closeConfirm(false)">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon">🗑</div>
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg">This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="confirm-ok" id="confirm-ok" onclick="closeConfirm(true)">Delete</button>
    </div>
  </div>
</div>

<aside class="sidebar-left">
  <div class="logo-area">
    <img src="logo_v1.png" alt="Frontier Logo" onerror="this.style.display='none'">
    <span class="logo-text">Frontier</span>
  </div>
  <a href="profile.html" class="sidebar-profile">
    <img id="sidebar-avatar" src="" class="sidebar-avatar" alt="avatar">
    <div>
      <div class="sidebar-uname" id="sidebar-name">—</div>
      <div class="sidebar-handle" id="sidebar-handle">@—</div>
    </div>
  </a>
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="globalSearch" class="search-input" placeholder="Search threads, users...">
    <div id="searchDropdown" class="search-dropdown"></div>
  </div>
  <nav class="nav-section">
    <span class="nav-label">Navigate</span>
    <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="news.html" class="nav-item"><span class="nav-icon">🎮</span><span>Game News</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
  </nav>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="handleLogout()">⏻ &nbsp;Logout</button>
  </div>
</aside>

<div class="main">
  <section class="thread-detail">
    
    <div class="back-bar">
      <a href="javascript:void(0)" class="btn-back" onclick="window.history.back()">← Back</a>
      <span class="breadcrumb">
        <a href="javascript:void(0)" onclick="window.history.back()">Back</a> / Thread
      </span>
    </div>

    <div id="thread-container">
      <div class="loading-state"><div class="spinner"></div>Loading thread...</div>
    </div>

    <div id="comments-container" style="display:none;">
      <div class="comments-header">
        <span class="comments-title">Replies</span>
        <span class="reply-count-badge" id="reply-count">0 replies</span>
      </div>
      
      <div class="top-reply-box">
        <div class="top-reply-row">
          <input class="reply-input" id="main-reply-input" placeholder="Write a reply...">
          <button class="btn-reply" onclick="postReply(null)">Reply</button>
        </div>
      </div>
      
      <div id="comments-list"></div>
    </div>
    
  </section>
</div>

<script src="app.js"></script>
<script>
const ME = { userId: null, username: null, token: null };
const likeCache = {};
let THREAD_ID = null;
let allComments = [];

/* ── TOAST ── */
function toast(msg, type = 'info') {
  const wrap = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('out'); el.addEventListener('animationend', () => el.remove()); }, 3000);
}

/* ── CONFIRM ── */
let _confirmResolve = null;
function showConfirm({ icon='🗑', title='Are you sure?', msg='This action cannot be undone.', okLabel='Delete' } = {}) {
  document.getElementById('confirm-icon').textContent  = icon;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok').textContent    = okLabel;
  document.getElementById('confirm-modal').classList.add('open');
  return new Promise(resolve => { _confirmResolve = resolve; });
}
function closeConfirm(val = false) {
  document.getElementById('confirm-modal').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(false); });

async function initThread() {
  if (!localStorage.getItem('token')) { window.location.href = 'index.html'; return; }

  await syncUserAvatar(); // ← ekle

  ME.userId   = localStorage.getItem('userId');
  ME.username = localStorage.getItem('username') || 'User';
  ME.token    = localStorage.getItem('token');

  const storedAvatar = localStorage.getItem('userAvatar');
  const av = storedAvatar ? storedAvatar : `https://ui-avatars.com/api/?name=${encodeURIComponent(ME.username)}&background=1a6fd4&color=fff&size=128&bold=true`;
  
  document.getElementById('sidebar-avatar').src  = av;
  document.getElementById('sidebar-name').textContent   = ME.username;
  document.getElementById('sidebar-handle').textContent = `@${ME.username}`;

  const params = new URLSearchParams(window.location.search);
  THREAD_ID = params.get('id');
  if (!THREAD_ID) { window.location.href = 'home.html'; return; }

  loadThread();
  initNotifications();
}

/* ── LOAD THREAD ── */
async function loadThread() {
  try {
    const [threads, comments] = await Promise.all([
      fetch(`${API_URL}/threads`).then(r => r.ok ? r.json() : []),
      fetch(`${API_URL}/comments/${THREAD_ID}`).then(r => r.ok ? r.json() : [])
    ]);

    const t = threads.find(x => String(x.id) === String(THREAD_ID));
    if (!t) { document.getElementById('thread-container').innerHTML = `<div class="empty-state"><p>Thread not found.</p></div>`; return; }

    allComments = comments;

    // Like & bookmark state
    let lk = { likes: 0, dislikes: 0, userVote: 0 };
    let bk = false;
    if (ME.userId) {
      [lk, bk] = await Promise.all([
        fetch(`${API_URL}/likes/thread/${t.id}?userId=${ME.userId}`).then(r => r.ok ? r.json() : lk).catch(() => lk),
        fetch(`${API_URL}/bookmarks/${ME.userId}`).then(r => r.ok ? r.json() : []).then(list => list.some(x => x.id === t.id)).catch(() => false)
      ]);
    }
    likeCache[`thread_${t.id}`] = lk;
    
    // Pre-fetch comment like states in one batch request
    if (ME.userId && comments.length) {
      const commentIds = comments.map(c => c.id);
      const commentLikes = await fetch(`${API_URL}/likes/batch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ threadIds: commentIds, userId: ME.userId, targetType: 'comment' })
      }).then(r => r.ok ? r.json() : {}).catch(() => {});
      if (commentLikes) {
        Object.entries(commentLikes).forEach(([id, data]) => {
          likeCache[`comment_${id}`] = data;
        });
      }
    }
    renderThread(t, lk, bk);
    renderComments();

    document.getElementById('comments-container').style.display = 'block';
    document.title = `${t.title} — Frontier Community`;
  } catch (e) {
    document.getElementById('thread-container').innerHTML = `<div class="empty-state"><p>Failed to load thread. Is the backend running?</p></div>`;
  }
}

/* ── RENDER THREAD ── */
function renderThread(t, lk, bk) {
  const isOwn = String(t.user_id) === String(ME.userId);
  const av = t.avatar_url ? escHtml(t.avatar_url) : `https://ui-avatars.com/api/?name=${encodeURIComponent(t.username||'U')}&background=1a6fd4&color=fff&size=64&bold=true`;

  document.getElementById('thread-container').innerHTML = `
    <div class="thread-body">
      <div class="thread-stripe"></div>
      <div class="thread-inner">
        <div class="thread-top">
          <img src="${av}" class="thread-avatar" alt="${escHtml(t.username)}">
          <div class="thread-meta">
            <div class="thread-author"><a href="profile.html?userId=${t.user_id}">@${escHtml(t.username)}</a></div>
            <div class="thread-time-full">${fullDate(t.created_at)}</div>
          </div>
          <span class="thread-cat">${escHtml(t.category_name || 'Discussion')}</span>
        </div>
        <div class="thread-title">${escHtml(t.title)}</div>
        <div class="thread-content">${escHtml(t.content)}</div>
        <div class="thread-actions">
          <button class="action-btn ${lk.userVote===1?'liked':''}" id="tlike-btn" onclick="voteThread(${t.id},1)">👍 <span id="tlike-count">${lk.likes}</span></button>
          <button class="action-btn ${lk.userVote===-1?'disliked':''}" id="tdislike-btn" onclick="voteThread(${t.id},-1)">👎 <span id="tdislike-count">${lk.dislikes}</span></button>
          <button class="action-btn ${bk?'bookmarked':''}" id="tbookmark-btn" onclick="toggleBookmark(${t.id})">🔖 <span id="tbm-label">${bk?'Saved':'Save'}</span></button>
          ${isOwn ? `<button class="action-btn delete-btn" onclick="deleteThread(${t.id})">🗑 Delete</button>` : ''}
        </div>
      </div>
    </div>`;
}

/* ── RENDER COMMENTS ── */
function renderComments() {
  const total = allComments.filter(c => !c.is_deleted).length;
  document.getElementById('reply-count').textContent = `${total} ${total === 1 ? 'reply' : 'replies'}`;
  document.getElementById('comments-list').innerHTML = buildCommentsHTML(allComments, null, 0);
}

function buildCommentsHTML(comments, parentId, depth) {
  const children = comments.filter(c =>
    parentId === null ? (c.parent_id == null) : String(c.parent_id) === String(parentId)
  );
  if (!children.length) return '';
  let html = '<div class="comment-tree">';
  children.forEach(c => { html += buildCommentItem(c, comments, depth); });
  html += '</div>';
  return html;
}

function buildCommentItem(c, all, depth) {
  const isOwn   = String(c.user_id) === String(ME.userId);
  const av      = c.avatar_url ? escHtml(c.avatar_url) : `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username||'U')}&background=161c2a&color=4db8ff&size=48`;
  const lk      = likeCache[`comment_${c.id}`] || { likes: 0, dislikes: 0, userVote: 0 };
  const deleted = c.is_deleted;
  const indent  = depth > 0 ? `margin-left:${Math.min(depth * 20, 80)}px;` : '';
  return `
    <div class="comment-item" id="ci-${c.id}" style="${indent}">
      <div class="comment-right">
        <div class="comment-bubble ${deleted ? 'deleted' : ''}">
          <div class="comment-author">
            <img src="${av}" style="width:16px;height:16px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:4px;">
            <a href="profile.html?userId=${c.user_id}" style="color:inherit;text-decoration:none;">@${escHtml(c.username)}</a>
          </div>
          <div class="comment-text">${deleted ? '<em>This comment was deleted.</em>' : escHtml(c.content)}</div>
        </div>
        <div class="comment-footer">
          <span class="comment-time">${fullDate(c.created_at)}</span>
          ${!deleted ? `
            <button class="comment-action c-like ${lk.userVote===1?'active':''}" id="clike-${c.id}" onclick="voteComment(${c.id},1)">👍 <span id="clike-count-${c.id}">${lk.likes}</span></button>
            <button class="comment-action c-dislike ${lk.userVote===-1?'active':''}" id="cdislike-${c.id}" onclick="voteComment(${c.id},-1)">👎 <span id="cdislike-count-${c.id}">${lk.dislikes}</span></button>
            <button class="comment-action" onclick="toggleReplyForm('rf-${c.id}')">Reply</button>
            ${isOwn ? `<button class="comment-action c-delete" onclick="deleteComment(${c.id})">Delete</button>` : ''}
          ` : ''}
        </div>
        <div class="reply-form" id="rf-${c.id}" style="display:none;">
          <input placeholder="Reply to @${escHtml(c.username)}..." maxlength="500" id="rfinput-${c.id}">
          <button onclick="postReply(${c.id})">Send</button>
        </div>
        ${buildCommentsHTML(all, c.id, depth + 1)}
      </div>
    </div>`;
}

function toggleReplyForm(id) {
  const el = document.getElementById(id); if (!el) return;
  const v = el.style.display !== 'none';
  el.style.display = v ? 'none' : 'flex';
  if (!v) el.querySelector('input')?.focus();
}

/* ── VOTE THREAD ── */
async function voteThread(threadId, value) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/like`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ targetId: threadId, targetType: 'thread', value })
    }).then(r => r.json());
    likeCache[`thread_${threadId}`] = res;
    document.getElementById('tlike-count').textContent   = res.likes;
    document.getElementById('tdislike-count').textContent = res.dislikes;
    document.getElementById('tlike-btn').className    = `action-btn ${res.userVote === 1  ? 'liked'    : ''}`;
    document.getElementById('tdislike-btn').className = `action-btn ${res.userVote === -1 ? 'disliked' : ''}`;
  } catch { toast('Failed to vote.', 'error'); }
}

/* ── VOTE COMMENT ── */
async function voteComment(commentId, value) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/like`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ targetId: commentId, targetType: 'comment', value })
    }).then(r => r.json());
    likeCache[`comment_${commentId}`] = res;
    document.getElementById(`clike-count-${commentId}`).textContent   = res.likes;
    document.getElementById(`cdislike-count-${commentId}`).textContent = res.dislikes;
    document.getElementById(`clike-${commentId}`).className    = `comment-action c-like ${res.userVote===1?'active':''}`;
    document.getElementById(`cdislike-${commentId}`).className = `comment-action c-dislike ${res.userVote===-1?'active':''}`;
  } catch { toast('Failed to vote.', 'error'); }
}

/* ── BOOKMARK ── */
async function toggleBookmark(threadId) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/bookmark`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ threadId })
    }).then(r => r.json());
    document.getElementById('tbookmark-btn').className = `action-btn ${res.bookmarked ? 'bookmarked' : ''}`;
    document.getElementById('tbm-label').textContent   = res.bookmarked ? 'Saved' : 'Save';
    toast(res.bookmarked ? 'Saved to profile!' : 'Removed from saved.', res.bookmarked ? 'success' : 'info');
  } catch { toast('Failed.', 'error'); }
}

/* ── DELETE THREAD ── */
async function deleteThread(threadId) {
  const ok = await showConfirm({ icon:'🗑', title:'Delete Discussion', msg:'This discussion and all its replies will be permanently removed.', okLabel:'Delete' });
  if (!ok) return;
  try {
    const res = await fetch(`${API_URL}/threads/${threadId}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` }
    });
    if (!res.ok) throw new Error();
    toast('Discussion deleted.', 'success');
    setTimeout(() => { window.location.href = 'home.html'; }, 1200);
  } catch { toast('Failed to delete.', 'error'); }
}

/* ── DELETE COMMENT ── */
async function deleteComment(commentId) {
  const ok = await showConfirm({ icon:'💬', title:'Delete Comment', msg:'Your comment will be marked as deleted.', okLabel:'Delete' });
  if (!ok) return;
  try {
    const res = await fetch(`${API_URL}/comments/${commentId}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` }
    });
    if (!res.ok) throw new Error();
    allComments = await fetch(`${API_URL}/comments/${THREAD_ID}`).then(r => r.json());
    renderComments();
    toast('Comment deleted.', 'success');
  } catch { toast('Failed to delete.', 'error'); }
}

/* ── POST REPLY ── */
async function postReply(parentId) {
  const inputId = parentId ? `rfinput-${parentId}` : 'main-reply-input';
  const input   = document.getElementById(inputId);
  const content = input?.value.trim();
  if (!content)   { toast('Reply cannot be empty.', 'error'); return; }
  if (!ME.userId) { toast('Session expired.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ threadId: THREAD_ID, content, parentId: parentId || null })
    });
    if (!res.ok) throw new Error();
    input.value = '';
    if (parentId) { const f = document.getElementById(`rf-${parentId}`); if (f) f.style.display = 'none'; }
    allComments = await fetch(`${API_URL}/comments/${THREAD_ID}`).then(r => r.json());
    renderComments();
    toast('Reply posted!', 'success');
  } catch { toast('Failed to reply.', 'error'); }
}

/* ── HELPERS ── */

function fullDate(d) {
  const userTZ     = localStorage.getItem('fc_pref_timezone') || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
  const userLocale = navigator.language || 'en';
  return parseDateSafely(d).toLocaleString(userLocale, {
    day: 'numeric', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
    timeZone: userTZ
  });
}

function escHtml(str) {
  const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML;
}

function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }

initThread();

</script>
</body>
</html>
