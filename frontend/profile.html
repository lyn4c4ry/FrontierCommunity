<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lyna Forum - Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile specific X.com style tweaks */
        .header-banner { height: 150px; background: #333; border-radius: 12px 12px 0 0; }
        .profile-info { margin-top: -50px; padding: 20px; position: relative; }
        .profile-avatar { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 4px solid #1a1a1a; background: #1a1a1a;
        }
        .bio-text { color: #888; margin: 10px 0; font-size: 14px; }
        .edit-btn { 
            float: right; border: 1px solid #bb86fc; color: #bb86fc; 
            background: transparent; width: auto; padding: 8px 16px; 
        }
    </style>
</head>
<body onload="initProfile()">
    <nav>
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </nav>

    <div class="container">
        <div class="form-container" style="padding: 0;">
            <div class="header-banner"></div>
            <div class="profile-info">
                <button class="edit-btn">Edit Profile</button>
                <img id="profile-page-pp" src="" class="profile-avatar">
                <h2 id="profile-username" style="margin: 10px 0 0 0; color: #fff;"></h2>
                <p id="profile-handle" style="color: #888; margin: 0;"></p>
                <p id="profile-bio" class="bio-text">Learning Computer Engineering at Ege University. Software enthusiast.</p>
            </div>
        </div>

        <div class="form-container">
            <h3 style="border-bottom: 2px solid #6f42c1; display: inline-block; padding-bottom: 5px;">Threads</h3>
            <div id="user-threads-list">
                <!-- Only this user's threads will show here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function initProfile() {
            if (!localStorage.getItem('token')) {
                window.location.href = 'index.html';
                return;
            }
            
            const username = localStorage.getItem('username');
            document.getElementById('profile-username').innerText = username;
            document.getElementById('profile-handle').innerText = `@${username}`;
            document.getElementById('profile-page-pp').src = `https://ui-avatars.com/api/?name=${username}&background=6f42c1&color=fff&size=128`;
            
            loadUserThreads(username);
        }
    </script>
</body>
</html>
