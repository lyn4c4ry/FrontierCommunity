<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FrontierCommunity — Profil</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── TEMEL GÜVENCE (Eğer style.css'te yoksa sayfa çökmesin diye) ── */
    :root {
      --bg:#080a0f; --bg2:#0d1018; --surface:#111520; --surface2:#161c2a;
      --border:rgba(74,144,226,0.10); --border2:rgba(74,144,226,0.22);
      --blue-light:#4db8ff; --blue-mid:#1a6fd4; --gold:#f5c518; --green:#22d47a; --red:#ff4060;
      --text:#dce8f5; --text-muted:#6a7f99; --text-dim:#2e3c50;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Nunito', sans-serif;
      margin: 0; padding: 0; display: flex; min-height: 100vh; overflow-x: hidden;
    }

    /* ── LEFT SIDEBAR ── */
    .sidebar-left{position:fixed;top:0;left:0;width:228px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;}
    .logo-area{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
    .logo-area img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(77,184,255,0.45));}
    .logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,var(--blue-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .sidebar-profile{margin:16px 13px 6px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:border-color 0.2s;}
    .sidebar-profile:hover{border-color:var(--blue-light);}
    .sidebar-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--blue-mid);flex-shrink:0;}
    .sidebar-uname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
    .sidebar-handle{font-size:11px;color:var(--text-muted);}
    .nav-section{padding:14px 10px 8px;flex:1;}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 12px;margin-bottom:5px;display:block;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:8px;color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:2px;transition:all 0.2s;}
    .nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
    .nav-item.active{background:rgba(26,111,212,0.12);color:var(--blue-light);}
    .nav-icon{font-size:16px;width:22px;text-align:center;}
    .sidebar-bottom{padding:14px;border-top:1px solid var(--border);}
    .btn-logout-side{width:100%;padding:9px;background:rgba(255,64,96,0.07);border:1px solid rgba(255,64,96,0.18);border-radius:8px;color:var(--red);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
    .btn-logout-side:hover{background:rgba(255,64,96,0.16);border-color:rgba(255,64,96,0.4);}

    /* ── MAIN CONTENT WRAPPER ── */
    .main { margin-left: 228px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── PROFILE PAGE SPECIFIC ── */
    .profile-page { width: 100%; max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; box-sizing: border-box; }
    .profile-hero { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border); }
    .hero-banner { height: 110px; background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 40%, #0a1628 100%); position: relative; }
    .hero-body { padding: 0 28px 22px; display: flex; align-items: flex-end; gap: 20px; }
    .avatar-wrap { position: relative; margin-top: -40px; flex-shrink: 0; }
    .avatar-frame { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--bg); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--blue-light); overflow: hidden; }
    .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { flex: 1; padding-bottom: 4px; }
    .hero-username { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); }
    .hero-sub { display: flex; align-items: center; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
    .hero-tag { font-size: 12px; color: var(--text-muted); font-family: 'Rajdhani', monospace; }
    .level-chip { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; color: var(--gold); background: rgba(245,197,24,0.1); border: 1px solid rgba(245,197,24,0.2); padding: 3px 10px; border-radius: 20px; }
    .hero-bio { margin-top: 8px; font-size: 13px; color: var(--text-muted); max-width: 480px; line-height: 1.6; }
    .hero-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 4px; }
    .btn-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; color: var(--text-muted); }
    
    .stat-bar { display: flex; border-top: 1px solid var(--border); }
    .stat-item { flex: 1; padding: 14px 20px; border-right: 1px solid var(--border); text-align: center; }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-top:4px; }

    /* ── 3-COL LAYOUT ── */
    .profile-grid { display: grid; grid-template-columns: 220px 1fr 210px; gap: 18px; align-items: start; }
    .side-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
    .side-title { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .info-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .info-icon { font-size: 15px; color: var(--blue-mid); width: 18px; text-align: center; }
    .info-key { color: var(--text-muted); flex: 1; }
    .info-val { color: var(--text); font-weight: 600; font-family: 'Rajdhani', sans-serif; }

    .tabs-header { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 14px; }
    .tab-btn { flex: 1; padding: 8px 12px; background: transparent; border: none; border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .tab-btn.active { background: var(--surface2); color: var(--blue-light); border: 1px solid var(--border2); }
    .tab-content { display: none; flex-direction: column; gap: 10px; }
    .tab-content.active { display: flex; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }

    /* MODAL VE TOAST */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 440px; }
    #toast { position: fixed; bottom: 28px; right: 28px; z-index: 9000; display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>

  <aside class="sidebar-left">
    <div class="logo-area">
      <img src="logo_v1.png" alt="Frontier Logo" onerror="this.style.display='none'">
      <span class="logo-text">Frontier</span>
    </div>
    <a href="profile.html" class="sidebar-profile">
      <img id="sidebar-avatar" src="" class="sidebar-avatar" alt="avatar">
      <div>
        <div class="sidebar-uname" id="sidebar-name">—</div>
        <div class="sidebar-handle" id="sidebar-handle">@—</div>
      </div>
    </a>
    <nav class="nav-section">
      <span class="nav-label">Navigate</span>
      <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
      <a href="news.html" class="nav-item"><span class="nav-icon">🎮</span><span>Game News</span></a>
      <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout-side" onclick="handleLogout()">⏻ &nbsp;Logout</button>
    </div>
  </aside>

  <div id="toast"></div>

  <div class="main">
    <div class="profile-page">
      <div class="profile-hero">
        <div class="hero-banner"></div>
        <div class="hero-body">
          <div class="avatar-wrap">
            <div class="avatar-frame" id="avatarFrame"><span id="avatarInitials">?</span></div>
            <div class="avatar-online"></div>
          </div>
          <div class="hero-info">
            <div class="hero-username" id="heroUsername">Yükleniyor...</div>
            <div class="hero-sub">
              <span class="hero-tag" id="heroTag">@...</span>
              <span class="level-chip" id="levelChip">⚡ LVL —</span>
            </div>
            <div class="hero-bio" id="heroBio"></div>
          </div>
        </div>

        <div class="stat-bar">
          <div class="stat-item"><div class="stat-num" id="statThreads" style="color:var(--blue-light)">—</div><div class="stat-label">Thread</div></div>
          <div class="stat-item"><div class="stat-num" id="statReplies">—</div><div class="stat-label">Yorum</div></div>
          <div class="stat-item"><div class="stat-num" id="statStreak" style="color:var(--gold)">—</div><div class="stat-label">Gün Serisi</div></div>
          <div class="stat-item"><div class="stat-num" id="statJoined">—</div><div class="stat-label">Katılım</div></div>
        </div>
      </div>

      <div class="profile-grid">
        <div class="left-col">
          <div class="side-card">
            <div class="side-title">Bilgiler</div>
            <div class="info-row"><span class="info-icon">📅</span><span class="info-key">Katılım</span><span class="info-val" id="infoJoined">—</span></div>
            <div class="info-row"><span class="info-icon">🌍</span><span class="info-key">Konum</span><span class="info-val">Türkiye</span></div>
          </div>
        </div>

        <div class="center-col">
          <div class="tabs-header">
            <button class="tab-btn active" onclick="switchTab('threads', this)">Thread'ler</button>
            <button class="tab-btn" onclick="switchTab('replies', this)">Yorumlar</button>
          </div>
          <div id="tab-threads" class="tab-content active">
             <div class="empty-state"><div class="empty-icon">📝</div><p>Thread'ler yükleniyor...</p></div>
          </div>
          <div id="tab-replies" class="tab-content">
             <div class="empty-state"><div class="empty-icon">💬</div><p>Yorumlar yükleniyor...</p></div>
          </div>
        </div>
        
        <div class="right-col">
            <div class="side-card">
                <div class="side-title">Aktivite</div>
                <div class="empty-state" style="padding:10px;"><p>Aktivite Haritası</p></div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // app.js ile çakışmaması için objenin adını 'profileState' olarak değiştirdik.
    const profileState = {
      userId:   null,
      username: null,
      token:    null,
    };

    function initProfile() {
      try {
        profileState.token    = localStorage.getItem('token');
        profileState.username = localStorage.getItem('username') || 'User';
        profileState.userId   = localStorage.getItem('userId');

        // Sol Menü Doldurma
        const sideAv = `https://ui-avatars.com/api/?name=${encodeURIComponent(profileState.username)}&background=1a6fd4&color=fff&size=128&bold=true`;
        document.getElementById('sidebar-avatar').src = sideAv;
        document.getElementById('sidebar-name').textContent = profileState.username;
        document.getElementById('sidebar-handle').textContent = `@${profileState.username.toLowerCase()}`;

        if (!profileState.token) {
          location.href = 'index.html';
          return;
        }

        // Ana Profil Doldurma (Görsel Test)
        document.getElementById('heroUsername').textContent = profileState.username;
        document.getElementById('heroTag').textContent = `@${profileState.username.toLowerCase()}`;
        document.getElementById('avatarInitials').textContent = profileState.username.slice(0, 2).toUpperCase();

      } catch (error) {
        console.error("Profil yüklenirken kritik bir hata oluştu:", error);
      }
    }

    function handleLogout() {
      localStorage.clear();
      location.href = 'index.html';
    }

    function switchTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${id}`).classList.add('active');
      btn.classList.add('active');
    }

    // Script yüklendiğinde başlat
    initProfile();
  </script>
</body>
</html>
