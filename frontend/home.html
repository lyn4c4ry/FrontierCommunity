<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frontier Community — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080a0f; --bg2:#0d1018; --surface:#111520; --surface2:#161c2a;
      --border:rgba(74,144,226,0.10); --border2:rgba(74,144,226,0.22);
      --blue:#1a6fd4; --blue-light:#4db8ff; --blue-glow:rgba(26,111,212,0.35);
      --gold:#f5c518; --text:#dce8f5; --text-muted:#6a7f99; --text-dim:#2e3c50;
      --red:#ff4060; --green:#22d47a;
      --r-sm:8px; --r:12px; --r-lg:18px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;display:flex;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.35;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--blue);}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast-msg{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 18px;font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;animation:toastIn 0.28s cubic-bezier(.22,1,.36,1) both;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
    .toast-msg.success{border-color:rgba(34,212,122,0.3);color:var(--green);}
    .toast-msg.error{border-color:rgba(255,64,96,0.3);color:var(--red);}
    .toast-msg.info{border-color:rgba(77,184,255,0.25);color:var(--blue-light);}
    .toast-msg.out{animation:toastOut 0.22s ease both;}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(6px)}}

    /* ── CONFIRM MODAL ── */
    #confirm-modal{position:fixed;inset:0;background:rgba(8,10,15,0.82);backdrop-filter:blur(6px);z-index:9998;display:none;align-items:center;justify-content:center;}
    #confirm-modal.open{display:flex;}
    .confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:32px 28px 24px;width:360px;max-width:90vw;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:confirmIn 0.22s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden;}
    .confirm-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),rgba(255,64,96,0.3));}
    @keyframes confirmIn{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .confirm-icon{font-size:36px;margin-bottom:12px;}
    .confirm-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .confirm-msg{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.5;}
    .confirm-btns{display:flex;gap:10px;justify-content:center;}
    .confirm-cancel{padding:9px 22px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;}
    .confirm-cancel:hover{border-color:var(--blue);color:var(--text);}
    .confirm-ok{padding:9px 22px;border-radius:var(--r);border:none;background:var(--red);color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.18s;}
    .confirm-ok:hover{opacity:0.82;}

    /* ── LEFT SIDEBAR ── */
    .sidebar-left{position:fixed;top:0;left:0;width:228px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow-y:auto;}
    .logo-area{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
    .logo-area img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(77,184,255,0.45));}
    .logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,var(--blue-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sidebar-profile{margin:16px 13px 6px;padding:12px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color 0.2s;text-decoration:none;}
    .sidebar-profile:hover{border-color:var(--blue);}
    .sidebar-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--blue);flex-shrink:0;}
    .sidebar-uname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text);}
    .sidebar-handle{font-size:11px;color:var(--text-muted);}
    .nav-section{padding:14px 10px 8px;flex:1;}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:0 12px;margin-bottom:5px;display:block;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:var(--r-sm);color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:600;transition:all 0.2s;margin-bottom:2px;}
    .nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
    .nav-item.active{background:rgba(26,111,212,0.12);color:var(--blue-light);}
    .nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
    .sidebar-bottom{padding:14px;border-top:1px solid var(--border);}
    .btn-logout{width:100%;padding:9px;background:rgba(255,64,96,0.07);border:1px solid rgba(255,64,96,0.18);border-radius:var(--r-sm);color:var(--red);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
    .btn-logout:hover{background:rgba(255,64,96,0.16);border-color:rgba(255,64,96,0.4);}

    /* ── MAIN ── */
    .main{margin-left:228px;flex:1;display:flex;min-height:100vh;}

    /* ── FEED ── */
    .feed{flex:1;max-width:700px;padding:28px 24px 80px;border-right:1px solid var(--border);}

    /* ── COMPOSE ── */
    .compose{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:20px;margin-bottom:26px;position:relative;overflow:hidden;}
    .compose::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--gold));}
    .compose-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;display:block;}
    .compose-row{display:flex;gap:12px;align-items:flex-start;}
    .compose-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;}
    .compose-fields{flex:1;display:flex;flex-direction:column;gap:8px;}
    .compose-input,.compose-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%;}
    .compose-input::placeholder,.compose-textarea::placeholder{color:var(--text-dim);}
    .compose-input:focus,.compose-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,212,0.12);}
    .compose-textarea{resize:none;height:74px;}
    .compose-footer{display:flex;justify-content:flex-end;margin-top:12px;}
    .btn-post{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--blue),#1255a8);border:none;padding:9px 24px;border-radius:var(--r-sm);cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px var(--blue-glow);}
    .btn-post:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 26px var(--blue-glow);}
    .btn-post:disabled{opacity:0.5;cursor:not-allowed;}

    /* ── FEED HEADER ── */
    .feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .feed-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;}
    .live-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);background:rgba(34,212,122,0.08);border:1px solid rgba(34,212,122,0.18);padding:4px 10px;border-radius:20px;}
    .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ── THREAD CARD ── */
    .thread-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;transition:border-color 0.2s;animation:fadeUp 0.35s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .thread-card:hover{border-color:var(--border2);}
    .thread-stripe{height:3px;}
    .stripe-blue{background:linear-gradient(90deg,var(--blue),transparent);}
    .stripe-gold{background:linear-gradient(90deg,var(--gold),transparent);}
    .stripe-green{background:linear-gradient(90deg,var(--green),transparent);}
    .thread-inner{padding:18px 22px;}
    .thread-top{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
    .thread-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2);flex-shrink:0;}
    .thread-meta{flex:1;}
    .thread-author{font-size:13px;font-weight:700;color:var(--text);}
    .thread-time{font-size:11px;color:var(--text-muted);}
    .thread-cat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.18);}
    .thread-title{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:7px;}
    .thread-content{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:15px;}

    /* ── ACTIONS ── */
    .thread-actions{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .action-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.18s;}
    .action-btn:hover{border-color:var(--border2);color:var(--text);}
    .action-btn.liked{border-color:rgba(26,111,212,0.5);color:var(--blue-light);background:rgba(26,111,212,0.1);}
    .action-btn.disliked{border-color:rgba(255,64,96,0.4);color:var(--red);background:rgba(255,64,96,0.08);}
    .action-btn.bookmarked{border-color:rgba(245,197,24,0.4);color:var(--gold);background:rgba(245,197,24,0.08);}
    .action-btn.delete-btn{margin-left:auto;border-color:rgba(255,64,96,0.2);color:rgba(255,64,96,0.5);}
    .action-btn.delete-btn:hover{border-color:rgba(255,64,96,0.5);color:var(--red);background:rgba(255,64,96,0.08);}

    /* ── COMMENTS ── */
    .thread-divider{height:1px;background:var(--border);margin-bottom:13px;}
    .comments-section{margin-bottom:12px;}
    .comment-tree{display:flex;flex-direction:column;gap:6px;}
    .comment-item{display:flex;gap:9px;}
    .comment-right{flex:1;min-width:0;}
    .comment-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;}
    .comment-bubble.deleted{opacity:0.45;font-style:italic;}
    .comment-author{font-size:11px;font-weight:700;color:var(--blue-light);margin-bottom:2px;}
    .comment-text{font-size:12px;color:var(--text-muted);line-height:1.5;word-break:break-word;}
    .comment-footer{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
    .comment-time{font-size:10px;color:var(--text-dim);}
    .comment-action{font-size:10px;font-weight:700;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s;font-family:'Nunito',sans-serif;}
    .comment-action:hover{color:var(--text-muted);}
    .comment-action.c-like.active{color:var(--blue-light);}
    .comment-action.c-dislike.active{color:var(--red);}
    .comment-action.c-delete:hover{color:var(--red);}
    .reply-form{display:flex;gap:6px;margin-top:6px;align-items:center;}
    .reply-form input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;outline:none;transition:border-color 0.2s;}
    .reply-form input::placeholder{color:var(--text-dim);}
    .reply-form input:focus{border-color:var(--blue);}
    .reply-form button{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.22);padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
    .reply-form button:hover{background:rgba(26,111,212,0.2);}
    .top-reply-row{display:flex;gap:7px;align-items:center;margin-top:4px;}
    .reply-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:7px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;outline:none;transition:border-color 0.2s;}
    .reply-input::placeholder{color:var(--text-dim);}
    .reply-input:focus{border-color:var(--blue);}
    .btn-reply{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue-light);background:rgba(26,111,212,0.1);border:1px solid rgba(26,111,212,0.22);padding:6px 14px;border-radius:30px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
    .btn-reply:hover:not(:disabled){background:rgba(26,111,212,0.22);border-color:var(--blue);}
    .btn-reply:disabled{opacity:0.5;cursor:not-allowed;}
    .show-more-comments{font-size:11px;color:var(--blue-light);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'Nunito',sans-serif;font-weight:700;transition:opacity 0.15s;}
    .show-more-comments:hover{opacity:0.7;}

    /* ── RIGHT SIDEBAR ── */
    .sidebar-right{width:272px;flex-shrink:0;padding:26px 16px;display:flex;flex-direction:column;gap:13px;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .widget{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;}
    .widget-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:13px;}

    /* Community stats */
    .stat-row{display:flex;gap:8px;}
    .stat-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;text-align:center;}
    .stat-num{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--blue-light);line-height:1;}
    .stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;}

    /* Top Discussions */
    .top-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
    .top-item:last-child{border-bottom:none;}
    .top-rank{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text-dim);width:20px;flex-shrink:0;line-height:1.2;text-align:center;}
    .top-rank.gold{color:var(--gold);}
    .top-rank.silver{color:#8fa8c8;}
    .top-rank.bronze{color:#c47a3a;}
    .top-info{flex:1;min-width:0;}
    .top-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .top-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
    .top-author{font-size:10px;color:var(--text-muted);}
    .top-likes{font-size:10px;color:var(--blue-light);font-weight:700;}

    /* New Members */
    .member-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
    .member-item:last-child{border-bottom:none;}
    .member-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--border2);}
    .member-info{flex:1;min-width:0;}
    .member-name{font-size:12px;font-weight:700;color:var(--text);}
    .member-since{font-size:10px;color:var(--text-muted);}
    .member-new{font-size:9px;font-weight:700;letter-spacing:0.5px;color:var(--green);background:rgba(34,212,122,0.08);border:1px solid rgba(34,212,122,0.2);padding:1px 6px;border-radius:10px;flex-shrink:0;}

    /* Empty state widget */
    .widget-empty{text-align:center;padding:18px 10px;}
    .widget-empty-icon{font-size:24px;margin-bottom:6px;opacity:0.4;}
    .widget-empty-text{font-size:11px;color:var(--text-dim);line-height:1.5;}

    /* Generic */
    .spinner{width:20px;height:20px;border:2px solid rgba(26,111,212,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin 0.75s linear infinite;margin:14px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state{padding:44px 20px;text-align:center;color:var(--text-muted);font-size:13px;}
    .loading-state .spinner{margin:0 auto 12px;}
    .empty-state{padding:44px 20px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);}
    .empty-icon{font-size:36px;margin-bottom:10px;}
    .empty-state p{font-size:13px;color:var(--text-muted);}

    /* Responsive */
    @media(max-width:1100px){.sidebar-right{display:none;}.feed{max-width:100%;border-right:none;}}
    @media(max-width:700px){
      .sidebar-left{width:56px;}
      .logo-text,.sidebar-uname,.sidebar-handle,.nav-item span,.nav-label{display:none;}
      .main{margin-left:56px;}
      .logo-area{justify-content:center;padding:14px 8px;}
      .sidebar-profile{justify-content:center;padding:10px;}
      .nav-item{justify-content:center;padding:10px;}
      .feed{padding:16px 12px 60px;}
    }
  </style>
</head>
<body onload="initHome()">

<div id="toast"></div>

<!-- ── CUSTOM CONFIRM MODAL ── -->
<div id="confirm-modal" onclick="if(event.target===this)closeConfirm(false)">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon">🗑</div>
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg">This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="confirm-ok" id="confirm-ok" onclick="closeConfirm(true)">Delete</button>
    </div>
  </div>
</div>

<aside class="sidebar-left">
  <div class="logo-area">
    <img src="logo_v1.png" alt="Frontier Logo" onerror="this.style.display='none'">
    <span class="logo-text">Frontier</span>
  </div>
  <a href="profile.html" class="sidebar-profile">
    <img id="sidebar-avatar" src="" class="sidebar-avatar" alt="avatar">
    <div>
      <div class="sidebar-uname" id="sidebar-name">—</div>
      <div class="sidebar-handle" id="sidebar-handle">@—</div>
    </div>
  </a>
  <nav class="nav-section">
    <span class="nav-label">Navigate</span>
    <a href="home.html" class="nav-item active"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="news.html" class="nav-item"><span class="nav-icon">🎮</span><span>Game News</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
  </nav>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="handleLogout()">⏻ &nbsp;Logout</button>
  </div>
</aside>

<div class="main">
  <section class="feed">
    <div class="compose">
      <span class="compose-label">New Discussion</span>
      <div class="compose-row">
        <img id="compose-avatar" src="" class="compose-avatar" alt="avatar">
        <div class="compose-fields">
          <input type="text" class="compose-input" id="thread-title" placeholder="Topic or game title..." maxlength="120">
          <textarea class="compose-textarea" id="thread-content" placeholder="Share your thoughts with the community..." maxlength="2000"></textarea>
        </div>
      </div>
      <div class="compose-footer">
        <button class="btn-post" id="btn-post" onclick="createThread()">Post →</button>
      </div>
    </div>
    <div class="feed-header">
      <span class="feed-title">Recent Discussions</span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>
    <div id="threads-list">
      <div class="loading-state"><div class="spinner"></div>Loading discussions...</div>
    </div>
  </section>

  <aside class="sidebar-right">
    <!-- Community Stats -->
    <div class="widget">
      <div class="widget-title">Community</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" id="stat-threads">—</div><div class="stat-label">Threads</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-comments">—</div><div class="stat-label">Replies</div></div>
      </div>
    </div>

    <!-- Top Discussions -->
    <div class="widget">
      <div class="widget-title">🔥 Top Discussions</div>
      <div id="widget-top-discussions"><div class="spinner"></div></div>
    </div>

    <!-- New Members -->
    <div class="widget">
      <div class="widget-title">👥 New Members</div>
      <div id="widget-new-members"><div class="spinner"></div></div>
    </div>
  </aside>
</div>

<script src="app.js"></script>
<script>
const ME = { userId: null, username: null, token: null };
const likeCache     = {};
const bookmarkCache = new Set();
const commentCache  = {};
const STRIPES = ['stripe-blue','stripe-gold','stripe-green'];

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function toast(msg, type='info') {
  const wrap = document.getElementById('toast');
  const el   = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('out'); el.addEventListener('animationend', () => el.remove()); }, 3000);
}

/* ══════════════════════════════════════════
   CUSTOM CONFIRM MODAL
══════════════════════════════════════════ */
let _confirmResolve = null;

function showConfirm({ icon = '🗑', title = 'Are you sure?', msg = 'This action cannot be undone.', okLabel = 'Delete' } = {}) {
  document.getElementById('confirm-icon').textContent  = icon;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok').textContent    = okLabel;
  document.getElementById('confirm-modal').classList.add('open');
  return new Promise(resolve => { _confirmResolve = resolve; });
}

function closeConfirm(val = false) {
  document.getElementById('confirm-modal').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(false); });

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function initHome() {
  if (!localStorage.getItem('token')) { window.location.href = 'index.html'; return; }
  ME.userId   = localStorage.getItem('userId');
  ME.username = localStorage.getItem('username') || 'User';
  ME.token    = localStorage.getItem('token');

  const av = `https://ui-avatars.com/api/?name=${encodeURIComponent(ME.username)}&background=1a6fd4&color=fff&size=128&bold=true`;
  setAvatars(av);
  document.getElementById('sidebar-name').textContent   = ME.username;
  document.getElementById('sidebar-handle').textContent = `@${ME.username}`;

  if (ME.userId) {
    fetch(`${API_URL}/auth/profile/${ME.userId}`)
      .then(r => r.ok ? r.json() : null)
      .then(u => { if (u?.avatar_url) setAvatars(u.avatar_url); })
      .catch(() => {});
    fetch(`${API_URL}/bookmarks/${ME.userId}`)
      .then(r => r.ok ? r.json() : [])
      .then(list => { list.forEach(t => bookmarkCache.add(t.id)); })
      .catch(() => {});
  }

  const prefill = sessionStorage.getItem('compose_prefill');
  if (prefill) {
    document.getElementById('thread-title').value = prefill;
    document.getElementById('thread-content').focus();
    sessionStorage.removeItem('compose_prefill');
    document.querySelector('.compose').scrollIntoView({ behavior: 'smooth' });
  }

  loadThreads();
}

function setAvatars(src) {
  document.getElementById('compose-avatar').src = src;
  document.getElementById('sidebar-avatar').src  = src;
}

/* ══════════════════════════════════════════
   LOAD THREADS
══════════════════════════════════════════ */
/**
 * Loads all threads from the backend and renders them to the UI.
 * Also synchronizes the like/dislike counts for each thread individually.
 */
async function loadThreads() {
  const el = document.getElementById('threads-list');
  el.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading discussions...</div>';
  
  try {
    // 1. Fetch all threads from the API
    const threads = await fetch(`${API_URL}/threads`).then(r => { 
      if (!r.ok) throw new Error("Failed to fetch threads"); 
      return r.json(); 
    });
    
    document.getElementById('stat-threads').textContent = threads.length;

    // Handle empty state
    if (!threads.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎮</div><p>No discussions yet. Be the first to post!</p></div>`;
      loadSidebarWidgets([]);
      return;
    }

    // 2. Fetch comments for all threads to update the global stats
    const commentResults = await Promise.all(
      threads.map(t => fetch(`${API_URL}/comments/${t.id}`).then(r => r.ok ? r.json() : []).catch(() => []))
    );
    
    document.getElementById('stat-comments').textContent = commentResults.reduce((s, c) => s + c.length, 0);

    // 3. Clear the list and render each thread
    el.innerHTML = '';
    
    threads.forEach((t, i) => {
      // Store comments in cache for the build function
      commentCache[t.id] = commentResults[i] || [];
      
      // Build the thread card element
      const card = buildThreadCard(t, commentCache[t.id], i);
      
      // Append the card to the DOM list
      el.appendChild(card);
      
      // 4. CRITICAL: Sync real-time interaction data (Likes/Dislikes/Votes)
      // We call this AFTER appendChild so the element IDs exist in the DOM
      if (typeof window.syncInteractions === 'function') {
        window.syncInteractions(t.id, 'thread', card);
      }
    });

    // 4. Load the right-side widgets
    loadSidebarWidgets(threads);

  } catch (e) {
    console.error("Critical error in loadThreads:", e);
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load. Is the backend running?</p></div>`;
    loadSidebarWidgets([]);
  }
}

/* ══════════════════════════════════════════
   SIDEBAR WIDGETS
══════════════════════════════════════════ */
async function loadSidebarWidgets(threads) {
  loadTopDiscussions(threads);
  loadNewMembers();
}

async function loadTopDiscussions(threads) {
  const el = document.getElementById('widget-top-discussions');
  if (!threads.length) {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-icon">🔥</div><div class="widget-empty-text">No discussions yet.<br>Be the first to post!</div></div>`;
    return;
  }

  try {
    // Fetch like counts for all threads in parallel
    const likeCounts = await Promise.all(
      threads.map(t =>
        fetch(`${API_URL}/likes/thread/${t.id}${ME.userId ? `?userId=${ME.userId}` : ''}`)
          .then(r => r.ok ? r.json() : { likes: 0, dislikes: 0 })
          .catch(() => ({ likes: 0, dislikes: 0 }))
      )
    );

    // Attach like scores and sort
    const scored = threads.map((t, i) => ({
      ...t,
      score: (likeCounts[i].likes || 0) - (likeCounts[i].dislikes || 0),
      likes: likeCounts[i].likes || 0
    })).sort((a, b) => b.score - a.score).slice(0, 5);

    const rankClasses = ['gold', 'silver', 'bronze', '', ''];
    el.innerHTML = scored.map((t, i) => `
      <div class="top-item">
        <div class="top-rank ${rankClasses[i]}">${i + 1}</div>
        <div class="top-info">
          <div class="top-title" title="${escHtml(t.title)}">${escHtml(t.title)}</div>
          <div class="top-meta">
            <span class="top-author">@${escHtml(t.username)}</span>
            <span class="top-likes">👍 ${t.likes}</span>
          </div>
        </div>
      </div>
    `).join('');
  } catch {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-icon">⚠️</div><div class="widget-empty-text">Could not load rankings.</div></div>`;
  }
}

async function loadNewMembers() {
  const el = document.getElementById('widget-new-members');
  try {
    // Fetch recent threads to extract unique recent users
    const threads = await fetch(`${API_URL}/threads`).then(r => r.ok ? r.json() : []).catch(() => []);

    if (!threads.length) {
      el.innerHTML = `<div class="widget-empty"><div class="widget-empty-icon">👥</div><div class="widget-empty-text">No members yet.</div></div>`;
      return;
    }

    // Deduplicate users, keep latest thread per user
    const seen   = new Set();
    const recent = [];
    [...threads].reverse().forEach(t => {
      if (!seen.has(t.user_id)) {
        seen.add(t.user_id);
        recent.push(t);
      }
    });

    // Fetch real profiles in parallel
    const profiles = await Promise.all(
      recent.slice(0, 5).map(t =>
        fetch(`${API_URL}/auth/profile/${t.user_id}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      )
    );

    const members = recent.slice(0, 5).map((t, i) => ({
      userId:    t.user_id,
      username:  profiles[i]?.username || t.username || 'User',
      avatarUrl: profiles[i]?.avatar_url || null,
      joinedAt:  profiles[i]?.created_at || t.created_at,
    }));

    // Sort by joinedAt desc to show newest first
    members.sort((a, b) => new Date(b.joinedAt) - new Date(a.joinedAt));

    el.innerHTML = members.map(m => {
      const av = m.avatarUrl
        ? `<img class="member-av" src="${escHtml(m.avatarUrl)}" alt="${escHtml(m.username)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m.username)}&background=161c2a&color=4db8ff&size=60'">`
        : `<img class="member-av" src="https://ui-avatars.com/api/?name=${encodeURIComponent(m.username)}&background=161c2a&color=4db8ff&size=60" alt="${escHtml(m.username)}">`;
      const isNew = m.joinedAt && (Date.now() - new Date(m.joinedAt)) < 7 * 24 * 60 * 60 * 1000;
      return `
        <div class="member-item">
          <a href="profile.html?userId=${m.userId}" style="display:contents;">${av}</a>
          <div class="member-info">
            <a href="profile.html?userId=${m.userId}" style="text-decoration:none;">
              <div class="member-name">@${escHtml(m.username)}</div>
            </a>
            <div class="member-since">Joined ${timeAgo(new Date(m.joinedAt))}</div>
          </div>
          ${isNew ? '<span class="member-new">NEW</span>' : ''}
        </div>
      `;
    }).join('');
  } catch {
    el.innerHTML = `<div class="widget-empty"><div class="widget-empty-icon">⚠️</div><div class="widget-empty-text">Could not load members.</div></div>`;
  }
}

/* ══════════════════════════════════════════
   BUILD THREAD CARD
══════════════════════════════════════════ */
function buildThreadCard(t, comments, i) {
  const av    = `https://ui-avatars.com/api/?name=${encodeURIComponent(t.username||'U')}&background=1a6fd4&color=fff&size=64&bold=true`;
  const isOwn = String(t.user_id) === String(ME.userId);
  const lk    = likeCache[`thread_${t.id}`] || { likes: 0, dislikes: 0, userVote: 0 };
  const bk    = bookmarkCache.has(t.id);
  const card  = document.createElement('div');
  card.className = 'thread-card'; card.id = `card-${t.id}`; card.style.animationDelay = `${i * 0.06}s`;
  card.style.cursor = 'pointer';
  card.addEventListener('click', (e) => {
    if (e.target.closest('button, input, a')) return;
    window.location.href = `thread.html?id=${t.id}`;
  });
  card.innerHTML = `
    <div class="thread-stripe ${STRIPES[i % 3]}"></div>
    <div class="thread-inner">
      <div class="thread-top">
        <a href="profile.html?userId=${t.user_id}" onclick="event.stopPropagation()">
          <img src="${av}" class="thread-avatar" alt="${escHtml(t.username)}">
        </a>
        <div class="thread-meta">
          <a href="profile.html?userId=${t.user_id}" onclick="event.stopPropagation()" style="text-decoration:none">
            <div class="thread-author">@${escHtml(t.username)}</div>
          </a>
          <div class="thread-time">${timeAgo(new Date(t.created_at))}</div>
        </div>
        <span class="thread-cat">Discussion</span>
      </div>
      <div class="thread-title" style="cursor:pointer" onclick="event.stopPropagation();window.location.href='thread.html?id=${t.id}'">${escHtml(t.title)}</div>
      <div class="thread-content">${escHtml(t.content)}</div>
      <div class="thread-actions">
        <button class="action-btn like-btn ${lk.userVote===1?'liked active':''}" id="tlike-${t.id}" onclick="event.stopPropagation(); voteThread(${t.id},1)">
          👍 <span id="tlike-count-${t.id}" class="count">${lk.likes}</span>
        </button>
        <button class="action-btn dislike-btn ${lk.userVote===-1?'disliked active':''}" id="tdislike-${t.id}" onclick="event.stopPropagation(); voteThread(${t.id},-1)">
          👎 <span id="tdislike-count-${t.id}" class="count">${lk.dislikes}</span>
        </button>
        <button class="action-btn ${bk?'bookmarked':''}" id="tbookmark-${t.id}" onclick="event.stopPropagation(); toggleBookmark(${t.id})">
          🔖 <span id="tbm-label-${t.id}">${bk?'Saved':'Save'}</span>
        </button>
        ${isOwn ? `<button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteThread(${t.id})">🗑 Delete</button>` : ''}
      </div>
      <div class="thread-divider"></div>
      <div class="comments-section" id="comments-${t.id}">${buildCommentsHTML(comments, t.id)}</div>
      <div class="top-reply-row">
        <input class="reply-input" id="reply-${t.id}" placeholder="Write a reply..." maxlength="500" onclick="event.stopPropagation()">
        <button class="btn-reply" onclick="event.stopPropagation(); postReply(${t.id},null)">Reply</button>
      </div>
    </div>`;
  return card;
}

/* ══════════════════════════════════════════
   COMMENTS
══════════════════════════════════════════ */
function buildCommentsHTML(comments, threadId, parentId = null, depth = 0) {
  const children = comments.filter(c => parentId === null
    ? (c.parent_id == null || c.parent_id === undefined)
    : String(c.parent_id) === String(parentId));
  if (!children.length) return '';
  const LIMIT   = 3;
  const visible = parentId === null ? children.slice(0, LIMIT) : children;
  const hidden  = parentId === null ? children.slice(LIMIT) : [];
  let html = '<div class="comment-tree">';
  visible.forEach(c => { html += buildCommentItem(c, comments, threadId, depth); });
  if (hidden.length) html += `<button class="show-more-comments" onclick="showMore(this,${threadId},'${JSON.stringify(hidden.map(c=>c.id)).replace(/'/g,"\\'")}')">▾ Show ${hidden.length} more comment${hidden.length > 1 ? 's' : ''}</button>`;
  html += '</div>'; return html;
}

function buildCommentItem(c, all, threadId, depth) {
  const isOwn   = String(c.user_id) === String(ME.userId);
  const av      = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.username||'U')}&background=161c2a&color=4db8ff&size=48`;
  const lk      = likeCache[`comment_${c.id}`] || { likes: 0, dislikes: 0, userVote: 0 };
  const deleted = c.is_deleted;
  const indent  = depth > 0 ? `margin-left:${Math.min(depth * 18, 72)}px;` : '';
  return `<div class="comment-item" id="ci-${c.id}" style="${indent}">
    <div class="comment-right">
      <div class="comment-bubble ${deleted ? 'deleted' : ''}">
        <div class="comment-author"><img src="${av}" style="width:16px;height:16px;border-radius:50%;vertical-align:middle;margin-right:4px;">@${escHtml(c.username)}</div>
        <div class="comment-text">${deleted ? '<em>This comment was deleted.</em>' : escHtml(c.content)}</div>
      </div>
      <div class="comment-footer">
        <span class="comment-time">${timeAgo(new Date(c.created_at))}</span>
        ${!deleted ? `
          <button class="comment-action c-like ${lk.userVote===1?'active':''}" id="clike-${c.id}" onclick="voteComment(${c.id},1,${threadId})">👍 <span id="clike-count-${c.id}">${lk.likes}</span></button>
          <button class="comment-action c-dislike ${lk.userVote===-1?'active':''}" id="cdislike-${c.id}" onclick="voteComment(${c.id},-1,${threadId})">👎 <span id="cdislike-count-${c.id}">${lk.dislikes}</span></button>
          <button class="comment-action" onclick="toggleReplyForm('rf-${c.id}')">Reply</button>
          ${isOwn ? `<button class="comment-action c-delete" onclick="deleteComment(${c.id},${threadId})">Delete</button>` : ''}
        ` : ''}
      </div>
      <div class="reply-form" id="rf-${c.id}" style="display:none;">
        <input placeholder="Reply to @${escHtml(c.username)}..." maxlength="500" id="rfinput-${c.id}">
        <button onclick="postReply(${threadId},${c.id})">Send</button>
      </div>
      ${buildCommentsHTML(all, threadId, c.id, depth + 1)}
    </div>
  </div>`;
}

function showMore(btn, threadId, idsJson) {
  const ids     = JSON.parse(idsJson);
  const comments = commentCache[threadId] || [];
  const toShow   = comments.filter(c => ids.includes(c.id));
  let html = ''; toShow.forEach(c => { html += buildCommentItem(c, comments, threadId, 0); });
  const w = document.createElement('div'); w.innerHTML = html;
  btn.parentNode.insertBefore(w, btn); btn.remove();
}

function toggleReplyForm(id) {
  const el = document.getElementById(id); if (!el) return;
  const v = el.style.display !== 'none'; el.style.display = v ? 'none' : 'flex';
  if (!v) el.querySelector('input')?.focus();
}

async function refreshComments(threadId) {
  try {
    const comments = await fetch(`${API_URL}/comments/${threadId}`).then(r => r.json());
    commentCache[threadId] = comments;
    const el = document.getElementById(`comments-${threadId}`);
    if (el) el.innerHTML = buildCommentsHTML(comments, threadId);
    document.getElementById('stat-comments').textContent = Object.values(commentCache).reduce((s, c) => s + c.length, 0);
  } catch (e) { console.error(e); }
}

/* ══════════════════════════════════════════
   VOTE / BOOKMARK
══════════════════════════════════════════ */
async function voteThread(threadId, value) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/like`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` }, 
      body: JSON.stringify({ userId: ME.userId, targetId: threadId, targetType: 'thread', value })
    }).then(r => r.json());
    likeCache[`thread_${threadId}`] = res;
    document.getElementById(`tlike-count-${threadId}`).textContent = res.likes;
    document.getElementById(`tdislike-count-${threadId}`).textContent = res.dislikes;
    document.getElementById(`tlike-${threadId}`).className    = `action-btn ${res.userVote === 1  ? 'liked'    : ''}`;
    document.getElementById(`tdislike-${threadId}`).className = `action-btn ${res.userVote === -1 ? 'disliked' : ''}`;
  } catch { toast('Failed to vote.', 'error'); }
}

async function voteComment(commentId, value, threadId) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/like`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ userId: ME.userId, targetId: commentId, targetType: 'comment', value })
    }).then(r => r.json());
    likeCache[`comment_${commentId}`] = res;
    document.getElementById(`clike-count-${commentId}`).textContent = res.likes;
    document.getElementById(`cdislike-count-${commentId}`).textContent = res.dislikes;
    document.getElementById(`clike-${commentId}`).className    = `comment-action c-like ${res.userVote === 1  ? 'active' : ''}`;
    document.getElementById(`cdislike-${commentId}`).className = `comment-action c-dislike ${res.userVote === -1 ? 'active' : ''}`;
  } catch { toast('Failed to vote.', 'error'); }
}

async function toggleBookmark(threadId) {
  if (!ME.userId) { toast('Please login.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/bookmark`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ME.token}` },
      body: JSON.stringify({ userId: ME.userId, threadId })
    }).then(r => r.json());
    if (res.bookmarked) { bookmarkCache.add(threadId); } else { bookmarkCache.delete(threadId); }
    document.getElementById(`tbookmark-${threadId}`).className = `action-btn ${res.bookmarked ? 'bookmarked' : ''}`;
    document.getElementById(`tbm-label-${threadId}`).textContent = res.bookmarked ? 'Saved' : 'Save';
    toast(res.bookmarked ? 'Saved to profile!' : 'Removed from saved.', res.bookmarked ? 'success' : 'info');
  } catch { toast('Failed.', 'error'); }
}

/* ══════════════════════════════════════════
   DELETE (custom confirm)
══════════════════════════════════════════ */
async function deleteThread(threadId) {
  const ok = await showConfirm({
    icon: '🗑',
    title: 'Delete Discussion',
    msg: 'This discussion and all its replies will be permanently removed.',
    okLabel: 'Delete'
  });
  if (!ok) return;
  try {
    const res = await fetch(`${API_URL}/threads/${threadId}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: ME.userId })
    });
    if (!res.ok) throw new Error();
    document.getElementById(`card-${threadId}`)?.remove();
    delete commentCache[threadId];
    toast('Discussion deleted.', 'success');
    // Refresh sidebar top discussions
    const threads = await fetch(`${API_URL}/threads`).then(r => r.ok ? r.json() : []).catch(() => []);
    loadTopDiscussions(threads);
  } catch { toast('Failed to delete.', 'error'); }
}

async function deleteComment(commentId, threadId) {
  const ok = await showConfirm({
    icon: '💬',
    title: 'Delete Comment',
    msg: 'Your comment will be marked as deleted and hidden from others.',
    okLabel: 'Delete'
  });
  if (!ok) return;
  try {
    const res = await fetch(`${API_URL}/comments/${commentId}`, {
      method: 'DELETE', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: ME.userId })
    });
    if (!res.ok) throw new Error();
    await refreshComments(threadId);
    toast('Comment deleted.', 'success');
  } catch { toast('Failed to delete.', 'error'); }
}

/* ══════════════════════════════════════════
   CREATE / REPLY
══════════════════════════════════════════ */
async function createThread() {
  const titleEl   = document.getElementById('thread-title');
  const contentEl = document.getElementById('thread-content');
  const btn       = document.getElementById('btn-post');
  const title     = titleEl.value.trim();
  const content   = contentEl.value.trim();
  if (!title)   { toast('Please enter a title.', 'error'); titleEl.focus(); return; }
  if (!content) { toast('Please write something.', 'error'); contentEl.focus(); return; }
  if (!ME.userId) { toast('Session expired.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Posting...';
  try {
    const res = await fetch(`${API_URL}/threads`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, userId: ME.userId })
    });
    if (!res.ok) throw new Error();
    titleEl.value = ''; contentEl.value = '';
    toast('Discussion posted!', 'success');
    await loadThreads();
  } catch { toast('Failed to post.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Post →'; }
}

async function postReply(threadId, parentId) {
  const inputId = parentId ? `rfinput-${parentId}` : `reply-${threadId}`;
  const input   = document.getElementById(inputId);
  const content = input?.value.trim();
  if (!content)   { toast('Reply cannot be empty.', 'error'); return; }
  if (!ME.userId) { toast('Session expired.', 'error'); return; }
  try {
    const res = await fetch(`${API_URL}/comments`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ threadId, userId: ME.userId, content, parentId: parentId || null })
    });
    if (!res.ok) throw new Error();
    input.value = '';
    if (parentId) { const f = document.getElementById(`rf-${parentId}`); if (f) f.style.display = 'none'; }
    toast('Reply posted!', 'success');
    await refreshComments(threadId);
  } catch { toast('Failed to reply.', 'error'); }
}

function handleLogout() { localStorage.clear(); window.location.href = 'index.html'; }

function timeAgo(d) {
  const date = new Date(d);
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = diffMs / (1000 * 60 * 60);

  if (diffMins < 1)   return 'just now';
  if (diffMins < 60)  return `${diffMins}m ago`;

  if (diffHours < 24) {
    return date.toLocaleTimeString('en-US', {
      hour: '2-digit',
      minute: '2-digit',
      hour12: false,
      timeZone: 'Europe/Istanbul'
    });
  }

  const todayIst  = new Date(now.toLocaleString('en-US',  { timeZone: 'Europe/Istanbul' }));
  const dateIst   = new Date(date.toLocaleString('en-US', { timeZone: 'Europe/Istanbul' }));
  todayIst.setHours(0, 0, 0, 0);
  dateIst.setHours(0, 0, 0, 0);
  const dayDiff = Math.round((todayIst - dateIst) / 86400000);

  if (dayDiff === 1) return 'Yesterday';
  if (dayDiff < 7)   return `${dayDiff} days ago`;

  return date.toLocaleDateString('en-US', {
    day: 'numeric',
    month: 'short',
    year: 'numeric',
    timeZone: 'Europe/Istanbul'
  });
}

function escHtml(str) {
  const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML;
}

/**
 * Synchronizes likes and dislikes from the server.
 * Added console.logs to debug why it's not showing on Home.
 */
window.syncInteractions = async function(targetId, targetType, cardElement) {
  const userId = localStorage.getItem('userId');
  try {
    const res = await fetch(`${API_URL}/likes/${targetType}/${targetId}?userId=${userId}`);
    const data = await res.json();

    // Senin HTML'indeki spesifik ID'leri yakalıyoruz
    const lSpan = document.getElementById(`tlike-count-${targetId}`);
    const dSpan = document.getElementById(`tdislike-count-${targetId}`);
    const lBtn  = document.getElementById(`tlike-${targetId}`);
    const dBtn  = document.getElementById(`tdislike-${targetId}`);

    if (lSpan) lSpan.innerText = data.likes || 0;
    if (dSpan) dSpan.innerText = data.dislikes || 0;

    // Renkleri/Aktiflik durumunu güncelle
    lBtn?.classList.toggle('active', data.userVote === 1);
    lBtn?.classList.toggle('liked', data.userVote === 1);
    dBtn?.classList.toggle('active', data.userVote === -1);
    dBtn?.classList.toggle('disliked', data.userVote === -1);

    console.log(`[SYNC] Thread ${targetId} updated: ${data.likes} likes`);
  } catch (err) {
    console.error(`[SYNC ERROR] ID ${targetId}:`, err);
  }
};

/**
 * Handles like/dislike button clicks.
 */
async function handleLikeClick(targetId, targetType, value, btn) {
  const token = localStorage.getItem('token');
  if (!token) {
    alert("Please log in to interact with posts.");
    return;
  }

  try {
    const res = await fetch(`${API_URL}/like`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ targetId, targetType, value })
    });

    if (!res.ok) throw new Error('Failed to process vote');
    const data = await res.json();
    
    const parent = btn.closest('.thread-card') || btn.closest('.comment-item') || btn.parentElement;
    const likeBtn = parent.querySelector('.like-btn');
    const dislikeBtn = parent.querySelector('.dislike-btn');
    
    const lc = likeBtn.querySelector('.count') || parent.querySelector('.like-count');
    const dc = dislikeBtn.querySelector('.count') || parent.querySelector('.dislike-count');
    if (lc) lc.innerText = data.likes;
    if (dc) dc.innerText = data.dislikes;

    likeBtn.classList.toggle('active', data.userVote === 1);
    dislikeBtn.classList.toggle('active', data.userVote === -1);
  } catch (err) {
    console.error("Voting error:", err);
  }
}

/**
 * Fetches real-time like/dislike counts for each thread on the Home page.
 * This ensures the numbers are not 0 when the page is refreshed.
 */
async function refreshHomeInteractions(targetId, cardElement) {
  try {
    // We use the GET endpoint we created earlier
    const res = await fetch(`${API_URL}/likes/thread/${targetId}?userId=${ME.userId}`);
    const data = await res.json();

    const likeCountSpan = cardElement.querySelector('.like-btn .count') || cardElement.querySelector('.like-count');
    const dislikeCountSpan = cardElement.querySelector('.dislike-btn .count') || cardElement.querySelector('.dislike-count');
    const likeBtn = cardElement.querySelector('.like-btn');
    const dislikeBtn = cardElement.querySelector('.dislike-btn');

    if (likeCountSpan) likeCountSpan.innerText = data.likes;
    if (dislikeCountSpan) dislikeCountSpan.innerText = data.dislikes;

    // Highlight buttons if the user has already interacted
    if (data.userVote === 1) likeBtn.classList.add('active');
    if (data.userVote === -1) dislikeBtn.classList.add('active');
  } catch (err) {
    console.error("Failed to sync home likes:", err);
  }
}
